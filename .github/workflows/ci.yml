name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: ruff format --check .

  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e '.[dev]'
      # Skip the @pg-marked integration tests; this job verifies the
      # database-free units (embedder, fusion math) only.
      - run: pytest -m "not pg" --cov=rag_kit --cov-report=term-missing

  integration-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d rag"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgresql://rag:rag@localhost:5432/rag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: pytest -m pg

  memory-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify MEMORY directory exists and has required files
        run: |
          test -f MEMORY/full_history_ai.md
          test -f MEMORY/full_history_human.md
          test -f MEMORY/core_decisions_ai.md
          test -f MEMORY/core_decisions_human.md
      - name: Verify D-001 baseline decision exists
        run: |
          grep -q "id: D-001" MEMORY/core_decisions_ai.md
