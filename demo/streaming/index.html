<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>rag-production-kit — streaming demo</title>
  <style>
    :root {
      --bg: #0b0d12;
      --fg: #e8edf2;
      --muted: #8a93a6;
      --card: #151922;
      --border: #232938;
      --accent: #6ee7b7;
      --warn: #fcd34d;
      --err: #fca5a5;
    }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--fg);
      font: 14px/1.45 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    main { max-width: 900px; margin: 32px auto; padding: 0 20px; }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 6px; }
    .sub { color: var(--muted); margin: 0 0 24px; }
    .controls { display: flex; gap: 8px; align-items: center; margin: 0 0 20px; }
    input[type="text"] {
      flex: 1; padding: 9px 12px; background: var(--card); color: var(--fg);
      border: 1px solid var(--border); border-radius: 8px; font: inherit;
    }
    input[type="text"]:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
    button {
      padding: 9px 16px; background: var(--accent); color: #0b0d12;
      border: 0; border-radius: 8px; font: inherit; font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.55; cursor: progress; }
    .phases { display: grid; gap: 12px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
    }
    .card.start { opacity: 0.65; }
    .card-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 12px; margin-bottom: 6px;
    }
    .phase-name { font-weight: 600; font-size: 13px; }
    .phase-name.retrieving, .phase-name.retrieved { color: #93c5fd; }
    .phase-name.reranking,  .phase-name.reranked  { color: #c4b5fd; }
    .phase-name.generating, .phase-name.generated { color: var(--accent); }
    .phase-name.done                              { color: #6ee7b7; }
    .phase-name.error                             { color: var(--err); }
    .elapsed { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; }
    .phase-detail { color: var(--muted); font-size: 12px; }
    .chunk {
      border-top: 1px dashed var(--border);
      padding: 8px 0 0; margin-top: 8px;
      font-size: 13px;
    }
    .chunk .id { color: var(--muted); font-family: ui-monospace, "SFMono-Regular", monospace; }
    .answer {
      background: #0e1622; border: 1px solid #1a2842;
      padding: 12px 16px; border-radius: 10px;
      font-size: 14px; white-space: pre-wrap;
      min-height: 1.5em;
    }
    .footer { color: var(--muted); font-size: 12px; margin-top: 32px; }
    .footer a { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>rag-production-kit — streaming demo</h1>
    <p class="sub">Sends an SSE stream from <code>/stream?q=…</code>; renders each
      phase event as it arrives. In-memory corpus; no Postgres needed.</p>
    <form class="controls" id="form">
      <input type="text" id="q" name="q" value="postgres tuning" autocomplete="off" />
      <button type="submit" id="go">Run query</button>
    </form>
    <div id="answer" class="answer"></div>
    <div id="phases" class="phases" style="margin-top: 16px;"></div>
    <p class="footer">
      Issue <a href="https://github.com/jt-mchorse/rag-production-kit/issues/5">#5</a> ·
      <a href="https://github.com/jt-mchorse/rag-production-kit">jt-mchorse/rag-production-kit</a>
    </p>
  </main>
  <script src="/app.js"></script>
</body>
</html>
